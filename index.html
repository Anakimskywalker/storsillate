<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORSILLATE'S PAGE</title>
    <style>
        body {
            display: flex;
            flex-direction: column;  /* Allinea gli elementi in verticale */
            justify-content: center;  /* Centra orizzontalmente */
            align-items: center;      /* Centra verticalmente */
            min-height: 100vh;        /* Altezza minima pari allo schermo */
            margin: 0;               
            padding: 20px;           /* Spazio di sicurezza ai bordi */
            box-sizing: border-box;
            background-color: #f0f0f0; 
            font-family: Arial, sans-serif; 
        }
        h1 {
            font-size: 2.5em; 
            color: #F70D1A;    
            position: relative; 
            z-index: 10;    /* Forzo sopra il canvas */
            text-align: center;
            margin: 10px 0;
        }
        h2 {
            font-size: 0.875em;
            color: #0000FF;    
            position: relative; 
            z-index: 10;    
            text-align: center;
            margin: 10px 0;
        }
        h3 {
            font-size: 0.875em;
            color: #000000;    
            position: relative; 
            z-index: 10;    
            text-align: center;
            margin: 5px 0;
        }
        
        img {
            margin-top: 25px; 
            margin-bottom: 20px;
            width: 12em;       /* Proporzionata alla dimensione delle scritte */
            max-width: 80%;    /* Non esce dagli schermi piccoli */
            height: auto;     
            position: relative;
            z-index: 10;       /* Forzo sopra il canvas */
            border-radius: 8px; 
        }

        canvas {
            position: fixed;   /* FISSO sullo sfondo, non si sposta con lo scroll */
            top: 0;             
            left: 0;            
            width: 100vw;        
            height: 100vh;       
            pointer-events: none; /* Rende il canvas trasparente ai click */
            z-index: 1;        /* Sotto a tutto il testo */
        }

        /* Ottimizzazione per smartphone */
        @media (max-width: 480px) {
            body {
                font-size: 14px; 
            }
            img {
                width: 10em; 
            }
        }
    </style>
</head>
<body>

    <h1>STORSILLO GYMBRO</h1>
    <h1>RISPETTO DI NESSUNO <br> PAURA DI TUTTI</h1>
