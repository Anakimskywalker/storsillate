<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORSILLATE'S PAGE</title>
    <style>
        body {
            display: flex;
            flex-direction: column;  /* Stack elements vertically */
            justify-content: center;  /* Center horizontally */
            align-items: center;      /* Center vertically */
            min-height: 100vh;        /* Full height of the viewport, allows scrolling if needed */
            margin: 0;               /* Remove default margin */
            padding: 20px;           /* Breathing room for content on mobile */
            box-sizing: border-box;
            background-color: #f0f0f0; /* Optional background color */
            font-family: Arial, sans-serif; /* Optional font style */
            position: relative; /* Set body position */
        }
        h1 {
            font-size: 2.5em; /* Optional font size */
            color: #F70D1A;    /* Optional text color */
            position: relative; /* Keep h1 in normal flow */
            z-index: 10;    /* Position above fireworks */
            text-align: center;
        }
        h2 {
            font-size: 0.875em;
            color: #0000FF;    /* Optional text color */
            position: relative; /* Keep h1 in normal flow */
            z-index: 10;    /* Position above fireworks */
            text-align: center;
        }
        h3 {
            font-size: 0.875em;
            color: #000000;    /* Optional text color */
            position: relative; /* Keep h1 in normal flow */
            z-index: 10;    /* Position above fireworks */
            text-align: center;
        }
        
        img {
            margin-top: 20px; 
            margin-bottom: 20px;
            /* Usiamo le em per proporzionarla al font di base */
            width: 12em;       
            max-width: 80%;   /* Impedisce all'immagine di uscire dallo schermo sui telefoni molto piccoli */
            height: auto;     /* Mantiene le proporzioni dell'immagine */
            position: relative;
            z-index: 10;    /* Position above fireworks */
            border-radius: 8px; 
        }
        canvas {
            position: absolute; /* Position canvas absolutely */
            top: 0;             /* Align to the top */
            left: 0;            /* Align to the left */
            width: 100%;        /* Full width */
            height: 100%;       /* Full height */
            pointer-events: none; /* Allow clicks through canvas */
            z-index: 1;        /* Position below content */
        }

        /* Regolazione per schermi piccoli: rimpicciolisce leggermente i testi e l'immagine di conseguenza */
        @media (max-width: 480px) {
            body {
                font-size: 14px; 
            }
            img {
                width: 10em; /* Diventa ancora più piccolina e bilanciata sui telefoni */
            }
