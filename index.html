    <canvas id="fireworks"></canvas>

    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function Firework(x, y) {
            this.x = x;
            this.y = y;
            // Tonalità di colore randomica fissa per l'intera esplosione
            this.hue = Math.random() * 360; 
            this.sparks = [];
            // Ridotto il numero di scintille per fuoco (da 100 a 40) per fluidità e pulizia visiva
            for (let i = 0; i < 40; i++) {
                this.sparks.push(new Spark(this.x, this.y, this.hue));
            }
        }

        function Spark(x, y, hue) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 2.5 + 1;
            // Angolo e velocità per un'esplosione circolare perfetta
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 6 + 2;
            this.speedX = Math.cos(angle) * speed;
            this.speedY = Math.sin(angle) * speed;
            
            this.gravity = 0.16;  // Forza di gravità che spinge verso il basso
            this.friction = 0.95; // Attrito dell'aria che frena le scintille
            this.hue = hue;
            this.alpha = 1;       // Opacità iniziale (piena)
            this.decay = Math.random() * 0.015 + 0.01; // Velocità di dissolvenza
        }

        Spark.prototype.update = function () {
            this.speedX *= this.friction;
            this.speedY *= this.friction;
            this.speedY += this.gravity;
            this.x += this.speedX;
            this.y += this.speedY;
            this.alpha -= this.decay; // Sfuma gradualmente
        };

        Spark.prototype.draw = function () {
            ctx.save();
            ctx.globalCompositeOperation = 'screen'; // Rende i colori più brillanti e accesi
            ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${this.alpha})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        };

        const fireworks = [];

        function animate() {
            // Effetto scia semitrasparente sullo sfondo
            ctx.fillStyle = 'rgba(240, 240, 240, 0.25)';
