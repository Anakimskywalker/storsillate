<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORSILLATE'S PAGE</title>
    <style>
        body {
            display: flex;
            flex-direction: column;  
            justify-content: center;  
            align-items: center;      
            min-height: 100vh;        
            margin: 0;               
            padding: 20px;           
            box-sizing: border-box;
            background-color: #f0f0f0; 
            font-family: Arial, sans-serif; 
        }
        h1 {
            font-size: 2.5em; 
            color: #F70D1A;    
            position: relative; 
            z-index: 10;    
            text-align: center;
            margin: 10px 0;
        }
        h2 {
            font-size: 0.875em;
            color: #0000FF;    
            position: relative; 
            z-index: 10;    
            text-align: center;
            margin: 10px 0;
        }
        h3 {
            font-size: 0.875em;
            color: #000000;    
            position: relative; 
            z-index: 10;    
            text-align: center;
            margin: 5px 0;
        }
        
        img {
            margin-top: 25px; 
            margin-bottom: 20px;
            width: 23.4em;     
            max-width: 90%;    
            height: auto;     
            position: relative;
            z-index: 10;       
            border-radius: 8px; 
        }

        canvas {
            position: fixed;   
            top: 0;             
            left: 0;            
            width: 100vw;        
            height: 100vh;       
            pointer-events: none; 
            z-index: 1; /* Rimane stabilmente sotto i testi e l'immagine */
        }

        @media (max-width: 480px) {
            body {
                font-size: 14px; 
            }
            img {
                width: 19.5em;   
            }
        }
    </style>
</head>
<body>

    <h1>STORSILLO GYMBRO</h1>
    <h1>RISPETTO DI NESSUNO <br> PAURA DI TUTTI</h1>
    
    <h3>03/09/24 Sydney Caput Mundi</h3>
    <h3>06/09/24 Cassano non è stupido è solo ignorante</h3>
    <h3>30/08/24 è proprio vero sono un fallito, chiisà cosa penserà mia figlia di suo padre</h3>
    
    <h2>Please don't take my data</h2>
    
    <img src="https://github.com/Anakimskywalker/storsillate/blob/main/storsilloshimself.png?raw=true" alt="Image">
    
    <canvas id="fireworks"></canvas>

    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function Firework(x, y) {
            this.x = x;
            this.y = y;
            this.hue = Math.random() * 360; 
            this.sparks = [];
            for (let i = 0; i < 50; i++) {
                this.sparks.push(new Spark(this.x, this.y, this.hue));
            }
        }

        function Spark(x, y, hue) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 2.5 + 1.5;
            
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 5 + 2;
            this.speedX = Math.cos(angle) * speed;
            this.speedY = Math.sin(angle) * speed;
            
            this.gravity = 0.12;  
            this.friction = 0.95; 
            this.hue = hue;
            this.alpha = 1;       
            this.decay = Math.random() * 0.015 + 0.01; 

            // Storico delle coordinate per creare la scia (compatibile al 100% con Chrome)
            this.history = [];
            for(let i = 0; i < 5; i++) {
                this.history.push({x: this.x, y: this.y});
            }
        }

        Spark.prototype.update = function () {
            // Aggiorna la coda della scia
            this.history.shift();
            this.history.push({x: this.x, y: this.y});

            this.speedX *= this.friction;
            this.speedY *= this.friction;
            this.speedY += this.gravity;
            this.x += this.speedX;
            this.y += this.speedY;
            this.alpha -= this.decay; 
        };

        Spark.prototype.draw = function () {
            ctx.save();
            ctx.globalCompositeOperation = 'screen'; 
            
            // Disegna la scia dietro la scintilla principale
            ctx.beginPath();
            ctx.moveTo(this.history[0].x, this.history[0].y);
            ctx.lineTo(this.x, this.y);
            ctx.strokeStyle = `hsla(${this.hue}, 100%, 60%, ${this.alpha * 0.3})`;
            ctx.lineWidth = this.size / 2;
            ctx.stroke();

            // Disegna la testa della scintilla
            ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${this.alpha})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        };

        const fireworks = [];

        function animate() {
            // RISOLTO PER CHROME: Svuota completamente lo schermo ad ogni frame senza bug di sovrapposizione
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = fireworks.length - 1; i >= 0; i--) {
                const firework = fireworks[i];
                for (let j = firework.sparks.length - 1; j >= 0; j--) {
                    const spark = firework.sparks[j];
                    spark.update();
                    spark.draw();
                    if (spark.alpha <= 0) {
                        firework.sparks.splice(j, 1);
                    }
                }
                if (firework.sparks.length === 0) {
                    fireworks.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }

        function createFirework() {
            const x = Math.random() * canvas.width;
            // Esplosioni focalizzate nella metà superiore dello schermo
            const y = Math.random() * (canvas.height * 0.35) + (canvas.height * 0.1);
            fireworks.push(new Firework(x, y));
        }

        window.onload = function () {
            for (let i = 0; i < 4; i++) {
                setTimeout(createFirework, i * 400);
            }
            animate();
            
            // Ciclo continuo ogni 1.8 secondi
            setInterval(createFirework, 1800);
        };
    </script>
</body>
</html>
